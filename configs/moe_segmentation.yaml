model:
  name: "nvidia/mit-b0"
  pretrained: true
  num_classes: 2
  img_size: 224
  moe:
    num_experts: 4
    top_k: 2
    capacity_factor: 1.2
    noisy_gating: true
    balance_loss_coef: 0.01

dataset:
  name: "oxford-iiit-pet"
  data_dir: "./data"
  batch_size: 16
  num_workers: 2

training:
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 15
  early_stopping_patience: 4
  seed: 42
  device: "cuda"
  fast_dev_run: false

logging:
  log_dir: "outputs/moe_segmentation/logs"
  checkpoint_dir: "outputs/moe_segmentation/checkpoints"
  plot_dir: "outputs/moe_segmentation/plots"
  use_tensorboard: true

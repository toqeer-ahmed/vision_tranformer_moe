model:
  name: "nvidia/mit-b0"
  pretrained: true
  num_classes: 2 # pet vs background
  img_size: 224

dataset:
  name: "oxford-iiit-pet"
  data_dir: "./data"
  batch_size: 16
  num_workers: 2

training:
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 15
  early_stopping_patience: 4
  seed: 42
  device: "cuda"
  fast_dev_run: false

logging:
  log_dir: "outputs/segmentation/logs"
  checkpoint_dir: "outputs/segmentation/checkpoints"
  plot_dir: "outputs/segmentation/plots"
  use_tensorboard: true

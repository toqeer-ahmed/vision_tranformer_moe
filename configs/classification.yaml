model:
  name: "google/vit-base-patch16-224"
  pretrained: true
  num_classes: 10
  img_size: 224

dataset:
  name: "cifar10" # options: "cifar10", "cifar100"
  data_dir: "./data"
  batch_size: 64
  num_workers: 2

training:
  lr: 2.0e-5
  weight_decay: 0.01
  epochs: 10
  early_stopping_patience: 3
  seed: 42
  device: "cuda"
  fast_dev_run: false

logging:
  log_dir: "outputs/classification/logs"
  checkpoint_dir: "outputs/classification/checkpoints"
  plot_dir: "outputs/classification/plots"
  use_tensorboard: true
